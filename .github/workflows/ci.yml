name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: advisor-profile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: advisor-profile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        # Acts as the database.types.ts drift guard: code that uses columns/types
        # not present in lib/supabase/database.types.ts fails to typecheck.
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  # ---------------------------------------------------------------------------
  # Optional jobs (enable once the data/match.db artifact and secrets are wired):
  #
  #   build:
  #     - requires data/match.db in the build context (see scripts/ensure-match-db.mjs)
  #     - run: npm run build
  #
  #   e2e:
  #     - requires Supabase + Playwright env (see e2e/env.example)
  #     - run: npx playwright install --with-deps && npm run test:e2e
  # ---------------------------------------------------------------------------
